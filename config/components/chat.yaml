image: ghcr.io/open-webui/open-webui:main
port: 8080
replicas: 1

# WebUI proxies every LLM call AND every RAG embedding call to the
# shared Ollama in the platform namespace, so it keeps no model in its
# own RAM — 1Gi is comfortable for the Python server + SQLite + light
# in-memory caches. (When RAG runs locally via sentence-transformers,
# this has to be ~2Gi to hold the embedding model.)
resources:
  requests: { cpu: "50m",  memory: "256Mi" }
  limits:   { cpu: "500m", memory: "1Gi" }

# Open WebUI's start.sh writes `.webui_secret_key` into its working
# directory (`/app/backend`) on first boot if WEBUI_SECRET_KEY is unset.
# `/app/backend` is baked into the image and not writable by uid 1000,
# so unattended boot fails with "Permission denied". Handing the key
# via env skips the file-write path entirely. Generated per-tenant by
# terraform (random_password), stored in the `chat-random-env` Secret,
# never persisted in YAML.
env_random:
  - WEBUI_SECRET_KEY
  # Bearer token shared between Open WebUI's main container (embedded
  # into TERMINAL_SERVER_CONNECTIONS below via `$(VAR)` expansion) and
  # the open-terminal sidecar (passed as OPEN_TERMINAL_API_KEY so its
  # /api/config endpoint rejects unauthenticated callers). Same value,
  # terraform-owned, rotated only when the tenant is recreated.
  - OPEN_TERMINAL_API_KEY

# Route RAG embeddings to the shared Ollama instead of pulling
# sentence-transformers locally. `RAG_OLLAMA_BASE_URL` is set to the
# same in-cluster URL Open WebUI already uses for chat completions —
# one model server, one place to manage models.
env_static:
  RAG_EMBEDDING_ENGINE: ollama
  RAG_OLLAMA_BASE_URL:  http://ollama.platform.svc.cluster.local:11434
  RAG_EMBEDDING_MODEL:  all-minilm:latest

  # `all-minilm` is embeddings-only; picking it in the chat UI returns
  # "model does not support chat". Hide it from the UI — the RAG backend
  # still uses it directly via RAG_EMBEDDING_MODEL above. The three chat
  # models stay visible so the user can A/B them side-by-side.
  DEFAULT_MODELS:      qwen2.5:7b
  ENABLE_MODEL_FILTER: "True"
  MODEL_FILTER_LIST:   qwen2.5:7b,qwen2.5:14b,qwen2.5-coder:7b

  # Pre-register the co-located mcp-weather sidecar as a native MCP tool
  # server so the chat model can call `get_current_weather`, `get_forecast`
  # and `geocode_city` out of the box. Open WebUI ≥ 0.6.31 reads this JSON
  # array on boot and seeds the `tool_server.connections` config row.
  # `auth_type: none` because the upstream server is reachable only over
  # loopback inside this Pod — the Pod boundary is the trust boundary, so
  # the bearer-token middleware in mcp-weather-simple stays unattached
  # (MCP_AUTH_TOKEN deliberately unset on the sidecar).
  #
  # Discovery of the tool specs still requires one manual "Verify + Save"
  # click in Admin → Settings → External Tools on the first fresh data
  # volume (upstream bug open-webui/open-webui#18140). A kubernetes Job
  # that calls the admin API is a planned follow-up if the click becomes
  # annoying; deferred for now.
  TOOL_SERVER_CONNECTIONS: |
    [
      {
        "type": "mcp",
        "url": "http://127.0.0.1:8000/mcp",
        "auth_type": "none",
        "key": "",
        "info": {
          "id": "mcp-weather",
          "name": "Weather",
          "description": "Open-Meteo backed weather/forecast/geocoding tools"
        },
        "config": { "enable": true },
        "access_control": null
      }
    ]

  # Register the co-located open-terminal sidecar as an "Open Terminal"
  # integration so the chat model can execute commands and manage files
  # inside its own terminal container. `$(OPEN_TERMINAL_API_KEY)` resolves
  # at Pod start — Kubernetes substitutes the value from the explicit
  # `env` entry emitted for every `env_random:` key (`envFrom` bindings
  # are not eligible for expansion). Same Verify+Save one-click caveat as
  # TOOL_SERVER_CONNECTIONS above (upstream #18140).
  TERMINAL_SERVER_CONNECTIONS: |
    [
      {
        "id": "open-terminal",
        "name": "Terminal",
        "url": "http://127.0.0.1:8001",
        "auth_type": "bearer",
        "key": "$(OPEN_TERMINAL_API_KEY)",
        "enabled": true,
        "access_control": null
      }
    ]

# Sidecars co-located with Open WebUI.
#
# mcp-weather-simple — loopback MCP tool server at 127.0.0.1:8000. The Pod
# boundary is the trust boundary, which is why `MCP_AUTH_TOKEN` is left
# unset (the bearer-token middleware in mcp-weather-simple skips itself
# when the env is missing; see upstream README §3).
#
# open-terminal — loopback OpenAPI terminal at 127.0.0.1:8001. The Alpine
# variant is the smallest image (~230 MB) and has the same feature set
# as the slim build; we just can't install extra apt/pip/npm packages at
# startup there. We deliberately skip the image's hardened entrypoint
# (tini + entrypoint-slim.sh) by overriding `command:` — that entrypoint
# needs to start as root to set up an iptables egress firewall we don't
# need (Kubernetes NetworkPolicy is our egress boundary). Bypassing it
# lets the sidecar run cleanly as UID 1000 under the Pod's restricted
# securityContext without `su-exec` privilege gymnastics. `/home/user` is
# declared writable so shell history, session state and uploaded files
# can land somewhere despite `readOnlyRootFilesystem: true`; emptyDir
# means they don't outlive the Pod, which is acceptable for a terminal
# scratchpad that belongs to the chat session.
sidecars:
  mcp-weather:
    image: ghcr.io/rromenskyi/mcp-weather-simple:0.1.0
    port:  8000
    env_static:
      MCP_TRANSPORT: streamable-http
      MCP_HOST:      127.0.0.1
      MCP_PORT:      "8000"
    resources:
      requests: { cpu: "20m",  memory: "64Mi" }
      limits:   { cpu: "500m", memory: "256Mi" }
    security:
      run_as_user:               1000
      read_only_root_filesystem: true

  open-terminal:
    image:   ghcr.io/open-webui/open-terminal:alpine
    port:    8001
    command: ["open-terminal"]
    args:    ["run", "--host", "127.0.0.1", "--port", "8001"]
    env_static:
      HOME: /home/user
    env_random:
      - OPEN_TERMINAL_API_KEY
    writable_paths:
      - /tmp
      - /home/user
    resources:
      requests: { cpu: "50m",  memory: "128Mi" }
      limits:   { cpu: "500m", memory: "256Mi" }
    security:
      run_as_user:               1000
      read_only_root_filesystem: true

# The image's landing page returns 200 only after the backend SQLite
# is seeded — first container boot can take 30–60s. `health_path` left
# at the default `/` is fine; the 5-minute startup_probe in
# modules/component covers the warmup.

# Open WebUI talks to Ollama over HTTP. The platform injects
# `OLLAMA_HOST=http://ollama.platform.svc...:11434` via the Secret —
# Open WebUI expects `OLLAMA_BASE_URL`, so this component also sets it
# to the same value via the shared secret by reading `OLLAMA_HOST` on
# container start (env passthrough handled by the image's entrypoint).
ollama: true

# Persistent state: users, chat history, uploaded files. hostPath lives
# at <host_volume_path>/<namespace>/chat/app-backend-data/ so the operator
# can back it up.
storage:
  - mount: /app/backend/data
    size: 5Gi

# Open WebUI runs as UID 1000 by default.
security:
  run_as_user: 1000
  fs_group:    1000
