image: wordpress:6.7-php8.3-apache
port: 80
replicas: 1
health_path: null   # WordPress setup returns 302 — disable HTTP probes
db: true
env:
  WORDPRESS_DB_HOST: DB_HOST
  WORDPRESS_DB_NAME: DB_NAME
  WORDPRESS_DB_USER: DB_USER
  WORDPRESS_DB_PASSWORD: DB_PASS
storage:
  - mount: /var/www/html/wp-content
    size: 10Gi

# The wordpress image runs Apache as www-data (UID 33). kubelet creates
# the hostPath as root:root, so without this block Apache cannot write
# to wp-content (uploads/, plugins/, cache/, ...). `fs_group: 33` makes
# kubelet chgrp the mounted volume to GID 33 at attach time, and the
# filesystem is group-writable by default on hostPath. The operator can
# then drop files into the directory from the host and they'll be
# readable by the pod; new files written by the pod stay group-33.
security:
  run_as_user: 33
  fs_group:    33

# Apache + mod_remoteip to recover the real client IP from Cloudflare's
# `CF-Connecting-IP` header. Traffic path:
#   Client → Cloudflare → Tunnel → Traefik → Apache.
# Without mod_remoteip, Apache's REMOTE_ADDR is Traefik's pod IP, so the
# access log and any IP-based logic see the internal CGNAT address
# instead of the user. With this module + trusted-proxy declaration,
# REMOTE_ADDR is rewritten to the real client. Sites are public —
# re-add a `<Location /> Require ip …</Location>` block below to lock
# the tenant down to a single operator IP.
config_files:
  /etc/apache2/mods-enabled/remoteip.load: |
    LoadModule remoteip_module /usr/lib/apache2/modules/mod_remoteip.so
  /etc/apache2/conf-enabled/remoteip.conf: |
    RemoteIPHeader CF-Connecting-IP
    RemoteIPInternalProxy 100.64.0.0/10
